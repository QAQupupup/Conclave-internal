# 沟通风格 Skill
# 规范Agent发言风格：自然语言、中文、无机器格式

id: communication_style
name: "沟通风格规范"
description: "Agent发言和消息格式规范：自然中文表达、避免机器格式、标签渲染规则"
version: 1
type: style
priority: 80
tags: ["communication", "format", "style"]

applies_to:
  stages: ["clarify", "intra_team", "cross_team", "evidence_check", "arbitrate"]
  deliverable_types: []
  roles: []
  complexity: []

prompt: |
  # 沟通风格规范

  ## 语言要求
  - 使用**自然流畅的中文**表达，不要夹杂不必要的英文术语（常见技术名词如API/Token/SQL可保留）
  - 角色名使用中文：主持人、产品架构师、工程师、安全专家、数据工程师、UX设计师
  - 阶段名使用中文：澄清议题、队内发言、跨队辩论、证据对照、仲裁裁决、产出文档/代码

  ## 发言格式
  - **不要**使用【角色·阶段】形式的机器头（如【product_architect·队内发言】），前端会自动显示角色名
  - 使用编号段落列出观点：`1. [事实] 观点内容`、`2. [假设] 观点内容`
  - 标签格式：用方括号包裹类型，会被前端渲染为彩色徽章
    - `[事实]`/`[假设]`/`[约束]`/`[风险]`/`[建议]`/`[结论]`
    - `[风险:高]`/`[风险:中]`/`[风险:低]`
    - `[常识]`/`[文档:xxx]`/`[web:xxx]`
  - 证据引用直接跟在论点后，用标签形式：`[常识]`、`[文档:用户调研.pdf]`
  - 每条论点独立一行，不要把多个论点挤在同一段落

  ## 内容质量
  - 论点具体可执行，不要空泛（"要做好安全" → "密码必须bcrypt哈希存储，JWT 24h过期"）
  - 引用证据时说明来源，不要编造数据
  - 表达观点时说明理由（为什么），不只说结论
  - 不同意见要明确表达并给出理由，不要随声附和

  ## 消息格式禁忌
  - 禁止输出原始JSON（除非是produce阶段的结构化输出）
  - 禁止输出Markdown表格（前端不支持）
  - 禁止使用emoji（除非用户明确要求）
  - 禁止使用 `---` 分隔线
  - 禁止末尾双标点（"。。"或"！。"），句末一个标点即可
  - 元信息（风险等级、证据来源）放在论点后的独立缩进行，使用 [meta] 标签
