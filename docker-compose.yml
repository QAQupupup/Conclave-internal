# ===== Conclave Docker Compose =====
# 完整部署：前端(nginx) + 后端(FastAPI) + 自动沙箱准备
#
# 启动: docker compose up -d
# 日志: docker compose logs -f backend
# 停止: docker compose down
#
# 项目命名空间：开发版固定为 conclave-dev，避免与开源版(conclave-oss)冲突
name: conclave-dev
#
# 沙箱架构（Sibling Containers + Socket Proxy）:
#   docker-socket-proxy 代理 Docker API，仅暴露 containers/images 端点
#   后端通过 DOCKER_HOST=tcp://docker-socket-proxy:2375 连接（不直挂 socket）
#   运行时通过代理创建临时 sibling 容器执行用户代码
#   工作区通过 named volume 在后端和沙箱容器间共享
#
# 网络隔离:
#   conclave-sandbox-l2: 自定义网络 + DNS 代理(dnsmasq)，仅解析白名单域名
#   L1 沙箱: --network none（无网络）
#   L2 沙箱: --network conclave-sandbox-l2（DNS 过滤）
#   L3 沙箱: --network bridge（全联网，需用户授权）

services:
  # ============================================================
  # Docker Socket Proxy — 限制 Docker API 暴露面
  # ============================================================
  docker-socket-proxy:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/tecnativa/docker-socket-proxy:v0.4.2
    container_name: conclave-dev-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # 仅开放沙箱需要的端点
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      VERSION: 1
      # 禁用所有危险端点
      EXEC: 0
      SERVICES: 0
      TASKS: 0
      SECRETS: 0
      PLUGINS: 0
      NETWORKS: 0
      NODES: 0
      SWARM: 0
      DISTRIBUTION: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      VOLUMES: 0
      SESSION: 0
      SYSTEM: 0
      EVENTS: 0
    networks:
      - conclave-internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2375/version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ============================================================
  # DNS 代理 — L2 网络隔离的域名白名单解析
  # ============================================================
  sandbox-dns:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/jpillora/dnsmasq:latest
    container_name: conclave-dev-sandbox-dns
    restart: unless-stopped
    command: --no-resolv --log-facility=- \
      --address=/pypi.org/151.101.0.223 \
      --address=/files.pythonhosted.org/151.101.0.223 \
      --address=/pypi.python.org/151.101.0.223 \
      --address=/mirrors.tuna.tsinghua.edu.cn/101.6.15.130 \
      --address=/0.0.0.0 \
      --server=8.8.8.8
    networks:
      conclave-sandbox-l2:
        ipv4_address: 10.20.0.10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conclave-dev-backend
    ports:
      - "8000:8000"
      - "6080:6080"   # noVNC Web 远程操作端口（CAPTCHA 值守模式）
    # [v4 安全加固] entrypoint 以 root 启动完成特权操作后降权到 uid 1000
    # 不再在 compose 中写死 user: "1000:1000"，而是由 entrypoint.sh 处理：
    #   1. root: 配置 docker.sock 权限、预拉取镜像、chown 目录
    #   2. 降权: su 到 app(1000:1000) 运行 uvicorn
    # 运行时 cap_drop + security_opt 仍限制进程能力
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE  # 处理 volume 权限
      - SYS_ADMIN     # Xvfb 有头浏览器需要（值守模式）
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined  # docker CLI + Playwright + Xvfb 需要 fork/exec 权限
    shm_size: "1g"  # Chromium + Xvfb 需要较大共享内存
    volumes:
      # Docker socket 不再直挂，通过 docker-socket-proxy 代理
      # 工作区命名卷：后端和沙箱容器共享
      - conclave-dev-workspace:/workspace
      # 数据库持久化
      - conclave-dev-data:/app/data
      # 挂载数据科学沙箱 Dockerfile（entrypoint 构建镜像需要）
      - ./backend/docker/sandbox-datascience:/app/docker/sandbox-datascience:ro
    tmpfs:
      - /tmp:size=100M,mode=1777
      - /var/tmp:size=50M,mode=1777
    env_file:
      - .env
    environment:
      - CONCLAVE_WORKSPACE_DIR=/workspace
      - CONCLAVE_DB_PATH=/app/data/conclave.db
      - CONCLAVE_SECRET_KEY=${CONCLAVE_SECRET_KEY:-}
      - CONCLAVE_SANDBOX_MODE=auto
      - CONCLAVE_QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://conclave:conclave_dev@postgres:5432/conclave}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CONCLAVE_API_TOKEN=${CONCLAVE_API_TOKEN:-}
      - CONCLAVE_LLM_TIMEOUT=${CONCLAVE_LLM_TIMEOUT:-120.0}
      - CONCLAVE_PRODUCE_TIMEOUT=${CONCLAVE_PRODUCE_TIMEOUT:-1200.0}
      # [v4] Docker 监控默认启用（entrypoint 会自动配置好权限）
      # 如果在无 Docker 的环境运行，可设 CONCLAVE_DOCKER_DISABLED=true
      - CONCLAVE_DOCKER_DISABLED=${CONCLAVE_DOCKER_DISABLED:-false}
      # Docker socket proxy: 通过代理连接 Docker API（不直挂 socket）
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    dns:
      - 8.8.8.8
      - 223.5.5.5
    networks:
      - conclave-internal
      - conclave-sandbox-l2
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s  # 首次启动需拉取镜像，给 60s 宽限期

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: conclave-dev-frontend
    ports:
      - "5173:80"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx:size=50M
      - /var/run:size=10M
      - /tmp:size=20M
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Qdrant 向量数据库（用于 RAG 文档检索）
  # ============================================================
  qdrant:
    image: conclave-dev-qdrant:latest
    build:
      context: ./docker
      dockerfile: Dockerfile.qdrant
      pull: false
    container_name: conclave-dev-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - conclave-dev-qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================
  # PostgreSQL 16 + pgvector
  # ============================================================
  postgres:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/pgvector/pgvector:pg16
    container_name: conclave-dev-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: conclave
      POSTGRES_USER: conclave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conclave_dev}
    volumes:
      - conclave-dev-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conclave -d conclave || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================
  # Redis（会话缓存 / 限流 / 任务队列）
  # ============================================================
  redis:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/redis:7-alpine
    container_name: conclave-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - conclave-dev-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  conclave-dev-workspace:
    driver: local
  conclave-dev-data:
    driver: local
  conclave-dev-qdrant-data:
    driver: local
  conclave-dev-pg-data:
    driver: local
  conclave-dev-redis-data:
    driver: local

networks:
  # 内部网络：backend ↔ socket-proxy ↔ 其他服务
  conclave-internal:
    driver: bridge
  # L2 沙箱网络：DNS 过滤限制出站域名
  conclave-sandbox-l2:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/16
          gateway: 10.20.0.1

