<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conclave — 创建会议</title>
    <style id="theme-vars">
/* Conclave UI Redesign — Brand CSS */
/* Tone: Editorial precision — clean, airy, restrained */
/* Primary hue: Indigo-blue family, single brand identity color */

:root {
  /* ── Brand Identity ── */
  --color-primary: #335c8e;
  --color-primary-light: #4a7ab5;
  --color-primary-dark: #264670;
  --color-primary-tint: rgba(51, 92, 142, 0.06);
  --color-primary-subtle: rgba(51, 92, 142, 0.10);

  /* ── Neutrals ── */
  --color-bg: #fafbfc;
  --color-bg-elevated: #ffffff;
  --color-bg-inset: #f3f5f7;
  --color-bg-sunken: #edf0f3;
  --color-border: #e2e6eb;
  --color-border-subtle: #eceff2;

  /* ── Text ── */
  --color-text: #1a1d23;
  --color-text-secondary: #5a6270;
  --color-text-tertiary: #8b929e;
  --color-text-inverse: #ffffff;

  /* ── State colors (semantic only) ── */
  --state-success: #2d8a56;
  --state-success-bg: rgba(45, 138, 86, 0.06);
  --state-warning: #b87d2b;
  --state-warning-bg: rgba(184, 125, 43, 0.06);
  --state-error: #c53030;
  --state-error-bg: rgba(197, 48, 48, 0.06);
  --state-info: #335c8e;
  --state-info-bg: rgba(51, 92, 142, 0.06);

  /* ── Role colors (derived from neutral + primary tints) ── */
  --role-moderator: var(--color-primary);
  --role-moderator-bg: var(--color-primary-tint);
  --role-architect: #6b4fa0;
  --role-architect-bg: rgba(107, 79, 160, 0.06);
  --role-engineer: #3a8a5c;
  --role-engineer-bg: rgba(58, 138, 92, 0.06);

  /* ── Typography ── */
  --font-sans: "Inter", -apple-system, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", Consolas, monospace;

  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 13px;
  --font-size-md: 14px;
  --font-size-lg: 16px;
  --font-size-xl: 20px;
  --font-size-2xl: 28px;
  --font-size-3xl: 36px;

  --line-height-tight: 1.3;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.65;

  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 600;
  --font-weight-bold: 700;

  --letter-spacing-tight: -0.01em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.04em;
  --letter-spacing-wider: 0.08em;

  /* ── Spacing ── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* ── Shape ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;

  /* ── Surface depth ── */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);

  /* ── Layout ── */
  --sidebar-width: 256px;
  --header-height: 56px;
  --panel-min-width: 320px;
}

/* ── Global reset ── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-sans);
  font-size: var(--font-size-base);
  line-height: var(--line-height-normal);
  color: var(--color-text);
  background: var(--color-bg);
  letter-spacing: var(--letter-spacing-normal);
}

/* ── Typography scale ── */
.conclave-h1 {
  font-size: var(--font-size-2xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--line-height-tight);
  letter-spacing: var(--letter-spacing-tight);
  color: var(--color-text);
}

.conclave-h2 {
  font-size: var(--font-size-xl);
  font-weight: var(--font-weight-semibold);
  line-height: var(--line-height-tight);
  letter-spacing: var(--letter-spacing-tight);
  color: var(--color-text);
}

.conclave-h3 {
  font-size: var(--font-size-lg);
  font-weight: var(--font-weight-semibold);
  line-height: var(--line-height-tight);
  color: var(--color-text);
}

.conclave-body {
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-secondary);
}

.conclave-caption {
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);
  color: var(--color-text-tertiary);
  letter-spacing: var(--letter-spacing-wide);
  text-transform: uppercase;
}

.conclave-mono {
  font-family: var(--font-mono);
  font-size: var(--font-size-sm);
  line-height: var(--line-height-relaxed);
  color: var(--color-text-secondary);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="flex items-center justify-center min-h-screen px-6 py-12" style="background: var(--color-bg);">

      <!-- Creation State -->
      <div id="state-create" class="w-full max-w-[560px]">
        <div class="rounded-xl p-8 md:p-10"
             style="background: var(--color-bg-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">

          <!-- Brand Header -->
          <header class="flex items-center gap-3 mb-2">
            <!-- Geometric accent: subtle diamond cluster suggesting assembly -->
            <div class="flex items-center gap-[3px]" aria-hidden="true">
              <span class="block w-[6px] h-[6px] rotate-45" style="background: var(--color-primary);"></span>
              <span class="block w-[4px] h-[4px] rotate-45" style="background: var(--color-primary); opacity: 0.5;"></span>
              <span class="block w-[3px] h-[3px] rotate-45" style="background: var(--color-primary); opacity: 0.25;"></span>
            </div>
            <h1 class="conclave-h1" style="text-wrap: balance;">Conclave</h1>
          </header>
          <p class="mb-10" style="font-size: var(--font-size-md); color: var(--color-text-secondary); letter-spacing: 0.02em;">
            多智能体会议系统
          </p>

          <!-- Thin separator -->
          <div class="mb-8" style="height: 1px; background: var(--color-border);"></div>

          <!-- Form -->
          <form id="meeting-form" class="flex flex-col gap-6" onsubmit="return false;">

            <!-- Topic textarea -->
            <div class="flex flex-col gap-2">
              <label for="meeting-topic"
                     class="inline-block"
                     style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-text-secondary);">
                议题
              </label>
              <textarea
                id="meeting-topic"
                name="topic"
                rows="4"
                placeholder="描述你想讨论的议题..."
                class="resize-none w-full px-4 py-3 outline-none transition-colors duration-150"
                style="font-family: var(--font-sans); font-size: var(--font-size-base); line-height: var(--line-height-relaxed); color: var(--color-text); background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); min-height: 120px;"
                onfocus="this.style.borderColor='var(--color-primary)'; this.style.boxShadow='0 0 0 2px var(--color-primary-tint)';"
                onblur="this.style.borderColor='var(--color-border)'; this.style.boxShadow='none';"
              ></textarea>
            </div>

            <!-- File upload -->
            <div class="flex flex-col gap-2">
              <label
                class="inline-block"
                style="font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-text-secondary);">
                参考文档
                <span style="color: var(--color-text-tertiary); font-weight: var(--font-weight-normal);">（可选）</span>
              </label>
              <label for="file-upload"
                     class="flex items-center gap-3 w-full px-4 py-3 cursor-pointer transition-colors duration-150"
                     style="font-size: var(--font-size-base); color: var(--color-text-tertiary); background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md);"
                     onmouseenter="this.style.borderColor='var(--color-text-tertiary)'"
                     onmouseleave="this.style.borderColor='var(--color-border)'"
              >
                <i data-lucide="paperclip" style="width: 16px; height: 16px; color: var(--color-text-tertiary);"></i>
                <span id="file-label">上传 .md 文件</span>
                <input type="file" id="file-upload" name="document" accept=".md,.markdown"
                       class="hidden"
                       onchange="document.getElementById('file-label').textContent = this.files.length ? this.files[0].name : '上传 .md 文件';">
              </label>
            </div>

            <!-- Submit -->
            <button
              type="submit"
              id="btn-create"
              data-dom-id="btn-start-meeting"
              class="flex items-center justify-center gap-2 w-full py-3 mt-2 font-semibold cursor-pointer transition-all duration-150"
              style="font-family: var(--font-sans); font-size: var(--font-size-md); color: var(--color-text-inverse); background: var(--color-primary); border: 1px solid transparent; border-radius: var(--radius-md); letter-spacing: 0.01em;"
              onmouseenter="this.style.background='var(--color-primary-light)'; this.style.transform='translateY(-1px)';"
              onmouseleave="this.style.background='var(--color-primary)'; this.style.transform='translateY(0)';"
              onmousedown="this.style.transform='translateY(0)'; this.style.background='var(--color-primary-dark)';"
              onmouseup="this.style.background='var(--color-primary-light)'; this.style.transform='translateY(-1px)';"
              onfocus="this.style.outline='2px solid var(--color-primary)'; this.style.outlineOffset='2px';"
              onblur="this.style.outline='none';"
              onclick="handleCreate()"
            >
              <i data-lucide="plus" style="width: 16px; height: 16px;"></i>
              创建会议
            </button>
          </form>
        </div>

        <!-- Footer line -->
        <p class="mt-6 text-center" style="font-size: var(--font-size-sm); color: var(--color-text-tertiary);">
          安全加密 &middot; 本地运行 &middot; 数据不离开你的设备
        </p>
      </div>

      <!-- After-creation State (hidden by default) -->
      <div id="state-ready" class="w-full max-w-[560px] hidden">
        <div class="rounded-xl p-8 md:p-10"
             style="background: var(--color-bg-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-lg);">

          <!-- Success indicator -->
          <div class="flex items-center gap-2 mb-6">
            <div class="flex items-center justify-center" style="width: 32px; height: 32px; border-radius: var(--radius-full); background: var(--state-success-bg);">
              <i data-lucide="check" style="width: 16px; height: 16px; color: var(--state-success);"></i>
            </div>
            <h2 class="conclave-h2">会议已创建</h2>
          </div>

          <!-- Meeting ID display -->
          <div class="flex flex-col gap-2 mb-8 p-4" style="background: var(--color-bg-inset); border-radius: var(--radius-md);">
            <span class="inline-block" style="font-size: var(--font-size-sm); color: var(--color-text-tertiary);">会议 ID</span>
            <span class="conclave-mono" style="font-size: var(--font-size-lg); color: var(--color-text); user-select: all;">
              #CVL-2026-0628-A3F7
            </span>
          </div>

          <!-- Actions -->
          <div class="flex gap-3">
            <button
              data-dom-id="btn-start-meeting"
              class="flex-1 flex items-center justify-center gap-2 py-3 font-semibold cursor-pointer transition-all duration-150"
              style="font-family: var(--font-sans); font-size: var(--font-size-md); color: var(--color-text-inverse); background: var(--color-primary); border: 1px solid transparent; border-radius: var(--radius-md);"
              onmouseenter="this.style.background='var(--color-primary-light)'; this.style.transform='translateY(-1px)';"
              onmouseleave="this.style.background='var(--color-primary)'; this.style.transform='translateY(0)';"
              onmousedown="this.style.transform='translateY(0)'; this.style.background='var(--color-primary-dark)';"
              onmouseup="this.style.background='var(--color-primary-light)'; this.style.transform='translateY(-1px)';"
              onfocus="this.style.outline='2px solid var(--color-primary)'; this.style.outlineOffset='2px';"
              onblur="this.style.outline='none';"
            >
              <i data-lucide="play" style="width: 16px; height: 16px;"></i>
              运行会议
            </button>
            <button
              class="flex items-center justify-center gap-2 px-6 py-3 font-medium cursor-pointer transition-colors duration-150"
              style="font-family: var(--font-sans); font-size: var(--font-size-md); color: var(--color-text-secondary); background: transparent; border: 1px solid var(--color-border); border-radius: var(--radius-md);"
              onmouseenter="this.style.borderColor='var(--color-text-tertiary)';"
              onmouseleave="this.style.borderColor='var(--color-border)';"
              onfocus="this.style.outline='2px solid var(--color-primary)'; this.style.outlineOffset='2px';"
              onblur="this.style.outline='none';"
              onclick="resetForm()"
            >
              新会议
            </button>
          </div>
        </div>
      </div>

    </main>

    <script>
    function handleCreate() {
      var topic = document.getElementById('meeting-topic').value.trim();
      if (!topic) {
        var textarea = document.getElementById('meeting-topic');
        textarea.style.borderColor = 'var(--state-error)';
        textarea.style.boxShadow = '0 0 0 2px var(--state-error-bg)';
        textarea.setAttribute('placeholder', '请输入会议议题');
        textarea.focus();
        return;
      }
      document.getElementById('state-create').classList.add('hidden');
      document.getElementById('state-ready').classList.remove('hidden');
      lucide.createIcons();
    }

    function resetForm() {
      document.getElementById('state-ready').classList.add('hidden');
      document.getElementById('state-create').classList.remove('hidden');
      document.getElementById('meeting-topic').value = '';
      document.getElementById('meeting-topic').style.borderColor = 'var(--color-border)';
      document.getElementById('meeting-topic').style.boxShadow = 'none';
      document.getElementById('file-label').textContent = '上传 .md 文件';
      document.getElementById('file-upload').value = '';
      lucide.createIcons();
    }
    </script>
    <script>lucide.createIcons();</script>
</body>
</html>
