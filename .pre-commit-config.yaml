# Conclave 本地提交卡点配置
# 安装：pip install pre-commit && pre-commit install
# 手动运行：pre-commit run --all-files
#
# 卡点说明：
# - 提交前自动运行 backend lint/format、frontend type check / lint、compose 配置校验。
# - 任何一项失败都会阻止 git commit，确保问题在本地暴露。
# - Windows 环境需要 Git Bash（Git 安装自带），pre-commit 依赖 bash 执行 hooks。
#
# 注意（§0.5.2）：
# - 不在 pre-commit 中运行 pytest（需要 PostgreSQL/Redis 等，必须在 Docker 容器内执行）。
# - 集成测试通过 CI 的 backend-integration-tests job 或手动 `docker compose -f docker-compose.test.yml up` 执行。

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        name: Backend lint (ruff)
        files: ^(backend/app|backend/conclave_core|backend/tests|backend/scripts)/.*\.py$
        args: [--fix, --exit-non-fix-on-fix]
      - id: ruff-format
        name: Backend format (ruff)
        files: ^(backend/app|backend/conclave_core|backend/tests|backend/scripts)/.*\.py$

  - repo: local
    hooks:
      - id: backend-py-compile
        name: Backend syntax check (py_compile)
        entry: bash -c 'cd backend && python -m py_compile $(find app conclave_core -name "*.py" -not -path "*/__pycache__/*" | head -100) && echo "py_compile passed"'
        language: system
        types: [python]
        pass_filenames: false
        stages: [commit]

      - id: frontend-tsc
        name: Frontend type check (tsc)
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [commit]

      - id: frontend-lint
        name: Frontend lint (eslint)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [commit]

      - id: frontend-build
        name: Frontend production build
        entry: bash -c 'cd frontend && npm run build'
        language: system
        files: ^frontend/.*\.(ts|tsx|css|html)$
        pass_filenames: false
        stages: [push]

      - id: compose-validate-dev
        name: Validate dev Docker Compose
        entry: bash -c 'docker compose -f docker-compose.yml config --quiet'
        language: system
        files: ^docker-compose\.yml$
        pass_filenames: false
        stages: [commit]

      - id: compose-validate-oss
        name: Validate OSS Docker Compose
        entry: bash -c 'docker compose -f docker-compose.oss.yml config --quiet'
        language: system
        files: ^docker-compose\.oss\.yml$
        pass_filenames: false
        stages: [commit]

      - id: oss-manifest-validate
        name: Validate OSS manifest JSON
        entry: python -m json.tool scripts/oss_manifest.json
        language: system
        files: ^scripts/oss_manifest\.json$
        pass_filenames: false
        stages: [commit]
