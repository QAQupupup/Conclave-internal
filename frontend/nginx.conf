server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # API 反向代理到后端（所有非静态资源请求）
    # 匹配 /api /meetings /health /workspace /ws /docs /openapi /redoc /agent-roles /preferences /regression /net-auth /documents /tags /metrics /debug 等所有 API 路径
    location ~ ^/(api|meetings|health|workspace|ws|docs|openapi|redoc|agent-roles|preferences|regression|net-auth|documents|tags|metrics|debug) {
        # WebSocket 升级
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_pass http://backend:8000;
    }

    # noVNC Web 代理（CAPTCHA 值守模式远程浏览器）
    # websockify 在后端容器的 6080 端口提供 VNC WebSocket + noVNC 静态文件
    # 路径重写：/vnc/vnc.html → backend:6080/vnc.html, /vnc/websockify → backend:6080/websockify
    location /vnc/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_pass http://backend:6080/;
    }

    # SPA fallback（静态资源 + 前端路由）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
