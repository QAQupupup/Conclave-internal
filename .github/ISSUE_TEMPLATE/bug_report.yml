name: Bug 报告
description: 报告一个 Bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间报告 Bug！请填写以下信息帮助我们定位问题。

  - type: input
    id: version
    attributes:
      label: Conclave 版本
      description: 运行 `git log --oneline -1` 查看 commit hash，或 Docker 镜像 tag
      placeholder: "例如: a383d91"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "例如: Windows 11 / macOS 14 / Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: docker
    attributes:
      label: Docker 版本
      description: 运行 `docker --version`
      placeholder: "例如: Docker version 27.0.3"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述 Bug 是什么
      placeholder: 告诉我发生了什么...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何触发这个 Bug
      placeholder: |
        1. 启动服务 '...'
        2. 输入议题 '....'
        3. 等待到 XX 阶段
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 粘贴相关错误日志（`docker logs conclave-backend` 最后 50 行）
      render: shell
