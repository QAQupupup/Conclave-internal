name: 功能建议
description: 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请详细描述你想要的功能。

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 这个功能解决了什么问题？当前有什么不便？
      placeholder: 当我做 XX 的时候，我希望能 XX...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望这个功能如何实现？
      placeholder: 描述你期望的行为、UI 设计或技术方案...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过其他实现方式吗？
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - 高（核心流程阻塞）
        - 中（体验提升）
        - 低（锦上添花）
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、参考链接、相关 Issue 等
    validations:
      required: false
