name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
  NPM_CONFIG_REGISTRY: https://registry.npmmirror.com

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --index-url ${{ env.PIP_INDEX_URL }}
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install "ruff>=0.4"
          ruff check app conclave_core tests

      - name: Check formatting with ruff
        run: |
          ruff format --check app conclave_core tests

      - name: Type check with mypy
        continue-on-error: true
        run: |
          pip install "mypy>=1.10"
          mypy app conclave_core

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint -- --max-warnings=0

      - name: Type check with tsc
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test

  compose-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for compose validation
        run: touch .env

      - name: Validate dev Docker Compose
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate OSS Docker Compose
        run: docker compose -f docker-compose.oss.yml config --quiet

  backend-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run backend tests in Docker Compose
        run: |
          docker compose -f docker-compose.test.yml up --build --exit-code-from backend-test

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes

  # ============================================================
  # 开源同步：全部 CI 检查通过后，自动编译并发布到 Conclave 开源仓库
  # ============================================================
  publish-oss:
    needs: [backend-checks, frontend-checks, frontend-tests, compose-check, backend-integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/release-oss.yml
    secrets: inherit
